name: CI — Lint & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apache-airflow==2.9.3 pytest pytest-mock pytest-cov
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check dags/ plugins/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=plugins --cov-report=xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t sharepoint-gcs-airflow:ci .
